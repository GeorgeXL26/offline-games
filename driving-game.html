<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Driving Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            height: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #00ff00;
            font-size: clamp(20px, 5vw, 32px);
            text-shadow: 0 0 10px #00ff00;
            margin-top: 5px;
        }

        .info {
            color: #00ff00;
            font-size: clamp(12px, 4vw, 16px);
            text-shadow: 0 0 5px #00ff00;
        }

        canvas {
            border: 3px solid #00ff00;
            background: linear-gradient(to bottom, #87CEEB, #90EE90);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            max-width: 100vw;
            max-height: 70vh;
            flex: 1;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .controls {
            color: #00ff00;
            font-size: clamp(10px, 3vw, 14px);
            text-align: center;
            line-height: 1.3;
            padding-bottom: 10px;
        }

        .touch-controls {
            display: none;
            gap: 15px;
            justify-content: center;
            align-items: center;
            padding: 10px;
            width: 100%;
            margin-top: auto;
        }

        .touch-controls.active {
            display: flex;
        }

        .control-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 255, 0, 0.7);
            border: 2px solid #00ff00;
            color: black;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            transition: all 0.1s;
            active-state: true;
        }

        .control-button:active {
            background: rgba(0, 255, 0, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            transform: scale(0.95);
        }

        .control-button:hover {
            background: rgba(0, 255, 0, 0.85);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: clamp(20px, 5vw, 40px);
            border: 3px solid #ff0000;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
            max-width: 90vw;
        }

        .game-over h2 {
            color: #ff0000;
            margin-bottom: 20px;
            font-size: clamp(24px, 6vw, 32px);
            text-shadow: 0 0 10px #ff0000;
        }

        .game-over p {
            color: #00ff00;
            margin: 10px 0;
            font-size: clamp(14px, 4vw, 18px);
        }

        .game-over button {
            margin-top: 20px;
            padding: clamp(8px, 3vw, 12px) clamp(16px, 5vw, 24px);
            background: #00ff00;
            color: black;
            border: none;
            border-radius: 5px;
            font-size: clamp(14px, 4vw, 18px);
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.3s;
        }

        .game-over button:hover,
        .game-over button:active {
            background: #00cc00;
            box-shadow: 0 0 10px #00ff00;
        }

        @media (max-width: 768px) {
            .controls {
                display: none;
            }

            canvas {
                max-height: 60vh;
            }
        }

        @media (orientation: landscape) {
            h1 {
                font-size: 20px;
                margin-top: 2px;
            }

            canvas {
                max-height: 85vh;
            }

            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 DRIVING GAME 🚗</h1>
        <div class="info">
            <p>Score: <span id="score">0</span> | Health: <span id="health">100</span>%</p>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <p>⬅️ A/D or Arrow Keys to Move ⬅️</p>
            <p>🚗 Avoid red cars! Collect green coins for points! 🚗</p>
        </div>
        <div class="touch-controls" id="touchControls">
            <button class="control-button" id="leftBtn">⬅️</button>
            <button class="control-button" id="rightBtn">➡️</button>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h2>GAME OVER!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Distance Traveled: <span id="distance">0</span>m</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const touchControls = document.getElementById('touchControls');

        // Detect if touch device
        const isTouchDevice = () => {
            return (('ontouchstart' in window) ||
                    (navigator.maxTouchPoints > 0) ||
                    (navigator.msMaxTouchPoints > 0));
        };

        // Show touch controls on mobile
        if (isTouchDevice()) {
            touchControls.classList.add('active');
        }

        // Set canvas size responsively
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 600);
            const maxHeight = window.innerHeight * 0.7;
            const aspectRatio = 400 / 600;

            let width = maxWidth;
            let height = width / aspectRatio;

            if (height > maxHeight) {
                height = maxHeight;
                width = height * aspectRatio;
            }

            canvas.width = Math.floor(width);
            canvas.height = Math.floor(height);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        let score = 0;
        let health = 100;
        let distance = 0;
        let gameRunning = true;

        // Player car
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 80,
            width: 40,
            height: 60,
            speed: 5,
            velocityX: 0,
            maxSpeed: 7
        };

        // Arrays for enemies and coins
        let enemies = [];
        let coins = [];
        let particles = [];

        // Input handling - Keyboard
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            e.preventDefault();
        });

        // Touch controls
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        let touchLeft = false;
        let touchRight = false;

        function setupTouchButton(button, isLeft) {
            button.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (isLeft) touchLeft = true;
                else touchRight = true;
            });

            button.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (isLeft) touchLeft = false;
                else touchRight = false;
            });

            button.addEventListener('mousedown', () => {
                if (isLeft) touchLeft = true;
                else touchRight = true;
            });

            button.addEventListener('mouseup', () => {
                if (isLeft) touchLeft = false;
                else touchRight = false;
            });

            button.addEventListener('mouseleave', () => {
                if (isLeft) touchLeft = false;
                else touchRight = false;
            });
        }

        setupTouchButton(leftBtn, true);
        setupTouchButton(rightBtn, false);

        // Gyroscope support for mobile
        let gyroX = 0;
        if (isTouchDevice() && window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                gyroX = event.gamma || 0; // Range: -90 to 90
            });
        }

        // Enemy car class
        class Enemy {
            constructor() {
                this.width = 35;
                this.height = 55;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = 3 + Math.random() * 3;
                this.lane = Math.floor(Math.random() * 3);
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Draw windows
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(this.x + 5, this.y + 8, 8, 8);
                ctx.fillRect(this.x + 22, this.y + 8, 8, 8);
            }

            isOffScreen() {
                return this.y > canvas.height;
            }
        }

        // Coin class
        class Coin {
            constructor() {
                this.radius = 8;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -20;
                this.speed = 2;
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.fillStyle = '#00ff00';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#00cc00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            isOffScreen() {
                return this.y > canvas.height;
            }
        }

        // Particle class for explosions
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = Math.random() * -4;
                this.life = 30;
                this.maxLife = 30;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life--;
            }

            draw() {
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = '#ff6600';
                ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
                ctx.globalAlpha = 1;
            }
        }

        // Draw player car
        function drawPlayer() {
            ctx.fillStyle = '#0099ff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Draw windows
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(player.x + 5, player.y + 10, 8, 10);
            ctx.fillRect(player.x + 27, player.y + 10, 8, 10);
            // Draw racing stripe
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(player.x + 18, player.y, 4, player.height);
        }

        // Collision detection
        function checkCollisions() {
            // Check enemy collisions
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (isColliding(player, enemies[i])) {
                    health -= 25;
                    // Create particles
                    for (let j = 0; j < 10; j++) {
                        particles.push(new Particle(enemies[i].x, enemies[i].y));
                    }
                    enemies.splice(i, 1);
                    if (health <= 0) {
                        endGame();
                    }
                }
            }

            // Check coin collisions
            for (let i = coins.length - 1; i >= 0; i--) {
                if (isCollidingWithCoin(player, coins[i])) {
                    score += 10;
                    coins.splice(i, 1);
                }
            }
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function isCollidingWithCoin(rect, coin) {
            const dx = rect.x + rect.width / 2 - coin.x;
            const dy = rect.y + rect.height / 2 - coin.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < rect.width / 2 + coin.radius;
        }

        // Update game
        function update() {
            // Player movement - Keyboard & Touch
            if (keys['a'] || keys['arrowleft'] || touchLeft) {
                player.velocityX = -player.maxSpeed;
            } else if (keys['d'] || keys['arrowright'] || touchRight) {
                player.velocityX = player.maxSpeed;
            } else {
                player.velocityX *= 0.8;
            }

            // Gyroscope support (if enabled)
            if (isTouchDevice() && Math.abs(gyroX) > 10) {
                player.velocityX = (gyroX / 90) * player.maxSpeed;
            }

            player.x += player.velocityX;

            // Boundary check
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                if (enemies[i].isOffScreen()) {
                    enemies.splice(i, 1);
                    distance += 10;
                    score += 5;
                }
            }

            // Update coins
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].update();
                if (coins[i].isOffScreen()) {
                    coins.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            checkCollisions();

            // Increase difficulty over time
            if (Math.random() < 0.02 + score / 1000) {
                enemies.push(new Enemy());
            }
            if (Math.random() < 0.01 + score / 2000) {
                coins.push(new Coin());
            }

            distance++;
        }

        // Draw everything
        function draw() {
            // Draw road
            ctx.fillStyle = '#333333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw road lines
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw lane dividers
            for (let y = 0; y < canvas.height; y += 30) {
                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = 0.3;
                ctx.fillRect(0, y, canvas.width, 15);
                ctx.globalAlpha = 1;
            }

            // Draw game objects
            for (let enemy of enemies) {
                enemy.draw();
            }
            for (let coin of coins) {
                coin.draw();
            }
            for (let particle of particles) {
                particle.draw();
            }
            drawPlayer();

            // Update UI
            document.getElementById('score').textContent = score;
            document.getElementById('health').textContent = Math.max(0, health);
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('distance').textContent = Math.floor(distance / 10);
            gameOverScreen.style.display = 'block';
        }

        // Game loop
        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();

        // Prevent default touch behaviors
        document.addEventListener('touchmove', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
