<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            color: #00ff00;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }

        .info {
            color: #00ff00;
            margin-bottom: 15px;
            font-size: 14px;
        }

        canvas {
            border: 3px solid #00ff00;
            background: linear-gradient(to bottom, #87CEEB, #90EE90);
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .controls {
            color: #00ff00;
            margin-top: 15px;
            font-size: 12px;
            line-height: 1.5;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border: 3px solid #ff0000;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
        }

        .game-over h2 {
            color: #ff0000;
            margin-bottom: 20px;
            font-size: 32px;
            text-shadow: 0 0 10px #ff0000;
        }

        .game-over p {
            color: #00ff00;
            margin: 10px 0;
            font-size: 18px;
        }

        .game-over button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00ff00;
            color: black;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .game-over button:hover {
            background: #00cc00;
            box-shadow: 0 0 10px #00ff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 DRIVING GAME 🚗</h1>
        <div class="info">
            <p>Score: <span id="score">0</span> | Health: <span id="health">100</span>%</p>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="controls">
            <p>⬅️ A/D or Arrow Keys to Move ⬅️</p>
            <p>🚗 Avoid red cars! Collect green coins for points! 🚗</p>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h2>GAME OVER!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Distance Traveled: <span id="distance">0</span>m</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('gameOverScreen');

        // Game variables
        let score = 0;
        let health = 100;
        let distance = 0;
        let gameRunning = true;

        // Player car
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 80,
            width: 40,
            height: 60,
            speed: 5,
            velocityX: 0,
            maxSpeed: 7
        };

        // Arrays for enemies and coins
        let enemies = [];
        let coins = [];
        let particles = [];

        // Keyboard input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Enemy car class
        class Enemy {
            constructor() {
                this.width = 35;
                this.height = 55;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = 3 + Math.random() * 3;
                this.lane = Math.floor(Math.random() * 3);
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Draw windows
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(this.x + 5, this.y + 8, 8, 8);
                ctx.fillRect(this.x + 22, this.y + 8, 8, 8);
            }

            isOffScreen() {
                return this.y > canvas.height;
            }
        }

        // Coin class
        class Coin {
            constructor() {
                this.radius = 8;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -20;
                this.speed = 2;
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.fillStyle = '#00ff00';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#00cc00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            isOffScreen() {
                return this.y > canvas.height;
            }
        }

        // Particle class for explosions
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = Math.random() * -4;
                this.life = 30;
                this.maxLife = 30;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life--;
            }

            draw() {
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = '#ff6600';
                ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
                ctx.globalAlpha = 1;
            }
        }

        // Draw player car
        function drawPlayer() {
            ctx.fillStyle = '#0099ff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Draw windows
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(player.x + 5, player.y + 10, 8, 10);
            ctx.fillRect(player.x + 27, player.y + 10, 8, 10);
            // Draw racing stripe
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(player.x + 18, player.y, 4, player.height);
        }

        // Collision detection
        function checkCollisions() {
            // Check enemy collisions
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (isColliding(player, enemies[i])) {
                    health -= 25;
                    // Create particles
                    for (let j = 0; j < 10; j++) {
                        particles.push(new Particle(enemies[i].x, enemies[i].y));
                    }
                    enemies.splice(i, 1);
                    if (health <= 0) {
                        endGame();
                    }
                }
            }

            // Check coin collisions
            for (let i = coins.length - 1; i >= 0; i--) {
                if (isCollidingWithCoin(player, coins[i])) {
                    score += 10;
                    coins.splice(i, 1);
                }
            }
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function isCollidingWithCoin(rect, coin) {
            const dx = rect.x + rect.width / 2 - coin.x;
            const dy = rect.y + rect.height / 2 - coin.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < rect.width / 2 + coin.radius;
        }

        // Update game
        function update() {
            // Player movement
            if (keys['a'] || keys['ArrowLeft']) {
                player.velocityX = -player.maxSpeed;
            } else if (keys['d'] || keys['ArrowRight']) {
                player.velocityX = player.maxSpeed;
            } else {
                player.velocityX *= 0.8;
            }

            player.x += player.velocityX;

            // Boundary check
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                if (enemies[i].isOffScreen()) {
                    enemies.splice(i, 1);
                    distance += 10;
                    score += 5;
                }
            }

            // Update coins
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].update();
                if (coins[i].isOffScreen()) {
                    coins.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            checkCollisions();

            // Increase difficulty over time
            if (Math.random() < 0.02 + score / 1000) {
                enemies.push(new Enemy());
            }
            if (Math.random() < 0.01 + score / 2000) {
                coins.push(new Coin());
            }

            distance++;
        }

        // Draw everything
        function draw() {
            // Draw road
            ctx.fillStyle = '#333333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw road lines
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw lane dividers
            for (let y = 0; y < canvas.height; y += 30) {
                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = 0.3;
                ctx.fillRect(0, y, canvas.width, 15);
                ctx.globalAlpha = 1;
            }

            // Draw game objects
            for (let enemy of enemies) {
                enemy.draw();
            }
            for (let coin of coins) {
                coin.draw();
            }
            for (let particle of particles) {
                particle.draw();
            }
            drawPlayer();

            // Update UI
            document.getElementById('score').textContent = score;
            document.getElementById('health').textContent = Math.max(0, health);
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('distance').textContent = Math.floor(distance / 10);
            gameOverScreen.style.display = 'block';
        }

        // Game loop
        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
