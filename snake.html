<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
}
#game {
    text-align: center;
}
canvas {
    border: 2px solid #333;
    background: #000;
}
#score {
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
}
#msg {
    color: #888;
    font-size: 14px;
    margin-top: 8px;
}
</style>
</head>
<body>
<div id="game">
    <div id="score">Score: 0</div>
    <canvas id="canvas" width="600" height="600"></canvas>
    <div id="msg">Arrow keys to move &nbsp;|&nbsp; Space to start</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const CELL = 20;
const COLS = 30;
const ROWS = 30;

let snake, direc, nextDirec, food, score, running, delay, timer;

function reset() {
    snake = [[COLS/2, ROWS/2], [COLS/2-1, ROWS/2], [COLS/2-2, ROWS/2]];
    direc = [1, 0];
    nextDirec = [1, 0];
    score = 0;
    running = false;
    delay = 150;
    newFood();
    draw();
    scoreEl.textContent = 'Score: 0';
}

function newFood() {
    while (true) {
        let fx = Math.floor(Math.random() * COLS);
        let fy = Math.floor(Math.random() * ROWS);
        if (!snake.some(s => s[0] === fx && s[1] === fy)) {
            food = [fx, fy];
            return;
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // grid
    for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
            ctx.fillStyle = '#111';
            ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
        }
    }

    // snake
    for (let i = 0; i < snake.length; i++) {
        let [x, y] = snake[i];
        ctx.fillStyle = i === 0 ? '#0f0' : '#070';
        ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
    }

    // apple
    if (food) {
        let [fx, fy] = food;
        let cx = fx * CELL + CELL/2;
        let cy = fy * CELL + CELL/2;
        ctx.fillStyle = '#f00';
        ctx.beginPath();
        ctx.arc(cx, cy, CELL/2 - 2, 0, Math.PI*2);
        ctx.fill();
        // stem
        ctx.strokeStyle = '#840';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy - CELL/2 + 4);
        ctx.lineTo(cx, cy - CELL/2 - 2);
        ctx.stroke();
        // leaf
        ctx.fillStyle = '#0a0';
        ctx.beginPath();
        ctx.ellipse(cx + 3, cy - CELL/2 + 1, 3, 2, 0.3, 0, Math.PI*2);
        ctx.fill();
    }
}

function gameOver() {
    running = false;
    draw();
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 200, canvas.width, 120);
    ctx.fillStyle = '#f00';
    ctx.font = 'bold 40px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, 270);
    ctx.fillStyle = '#fff';
    ctx.font = '18px Courier New';
    ctx.fillText('SPACE to restart', canvas.width/2, 310);
    scoreEl.textContent = 'Score: ' + score;
}

function tick() {
    if (!running) {
        timer = setTimeout(tick, delay);
        return;
    }

    direc = nextDirec;
    let head = [snake[0][0] + direc[0], snake[0][1] + direc[1]];

    // wall
    if (head[0] < 0 || head[0] >= COLS || head[1] < 0 || head[1] >= ROWS) {
        gameOver();
        return;
    }

    // self
    for (let s of snake) {
        if (s[0] === head[0] && s[1] === head[1]) {
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    if (head[0] === food[0] && head[1] === food[1]) {
        score += 10;
        scoreEl.textContent = 'Score: ' + score;
        newFood();
        if (delay > 60) delay -= 3;
    } else {
        snake.pop();
    }

    draw();
    timer = setTimeout(tick, delay);
}

function startGame() {
    reset();
    running = true;
    draw();
    let msg = document.getElementById('msg');
    msg.style.display = 'none';
}

// Keyboard
document.addEventListener('keydown', function(e) {
    let k = e.key;

    if (k === ' ' || k === 'Space') {
        e.preventDefault();
        if (!running) {
            startGame();
        }
        return;
    }

    if (!running) return;

    let [dx, dy] = direc;
    if (k === 'ArrowLeft' && dx !== 1) nextDirec = [-1, 0];
    else if (k === 'ArrowRight' && dx !== -1) nextDirec = [1, 0];
    else if (k === 'ArrowUp' && dy !== 1) nextDirec = [0, -1];
    else if (k === 'ArrowDown' && dy !== -1) nextDirec = [0, 1];
});

// Touch controls for phone
let touchStart = null;
document.addEventListener('touchstart', function(e) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('touchend', function(e) {
    if (!touchStart) return;
    if (!running) { startGame(); return; }
    let dx = e.changedTouches[0].clientX - touchStart.x;
    let dy = e.changedTouches[0].clientY - touchStart.y;
    let [cdx, cdy] = direc;
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && cdx !== -1) nextDirec = [1, 0];
        else if (dx < 0 && cdx !== 1) nextDirec = [-1, 0];
    } else {
        if (dy > 0 && cdy !== -1) nextDirec = [0, 1];
        else if (dy < 0 && cdy !== 1) nextDirec = [0, -1];
    }
    touchStart = null;
});

// Start
reset();
ctx.fillStyle = 'rgba(0,0,0,0.7)';
ctx.fillRect(0, 200, canvas.width, 120);
ctx.fillStyle = '#0f0';
ctx.font = 'bold 40px Courier New';
ctx.textAlign = 'center';
ctx.fillText('SNAKE', canvas.width/2, 260);
ctx.fillStyle = '#fff';
ctx.font = '18px Courier New';
ctx.fillText('SPACE to start', canvas.width/2, 300);
timer = setTimeout(tick, delay);
</script>
</body>
</html>
